<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nini Nuts - Admin Terminal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #F8F5EE; color: #4A3623; padding: 2rem; margin: 0; }
        .container { max-width: 800px; margin: auto; background: white; padding: 3rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(74, 54, 35, 0.05); display: none; }
        
        h2 { color: #3A2618; margin-bottom: 1.5rem; border-bottom: 2px solid #EBE5D9; padding-bottom: 0.5rem; font-size: 1.8rem; }
        label { font-weight: bold; display: block; margin-bottom: 0.5rem; margin-top: 1rem; color: #5C4636; }
        
        input, select { width: 100%; padding: 1rem; margin-bottom: 1rem; box-sizing: border-box; background: transparent; border: 1px solid #BCAAA4; border-radius: 8px; color: #4A3623; outline: none; font-size: 1rem; }
        input:focus, select:focus { border-color: #4A3623; }
        
        button { background: #4A3623; color: white; border: none; padding: 1rem 1.5rem; border-radius: 30px; cursor: pointer; font-weight: bold; font-size: 1.1rem; transition: 0.2s; width: 100%; }
        button:hover { background: #3A2618; }
        
        .btn-back { background: transparent; color: #4A3623; border: 1px solid #4A3623; width: auto; margin-bottom: 2rem; padding: 0.5rem 1.5rem; }
        .btn-back:hover { background: #EBE5D9; color: #4A3623; }
        
        .product-row { display: flex; justify-content: space-between; align-items: center; padding: 1.5rem 0; border-bottom: 1px solid #EBE5D9; }
        .product-row img { height: 70px; width: 70px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
        
        .btn-delete { width: auto; background: transparent; color: #D35400; border: 1px solid #D35400; padding: 8px 20px; border-radius: 20px; font-size: 0.9rem; margin: 0; }
        .btn-delete:hover { background: #D35400; color: white; }

        #passcode-screen { text-align: center; margin-top: 15vh; }
        #passcode-screen h2 { border: none; font-size: 2.5rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="passcode-screen">
    <h2>Admin Access Required</h2>
    <p style="color: #8C6A53;">Please verify your identity to manage the storefront.</p>
</div>

<div class="container" id="admin-dashboard">
    <button class="btn-back" onclick="window.location.href='index.html'">← Back to Shop</button>
    
    <h2>Add New Product</h2>
    <form onsubmit="addProduct(event)">
        <label>Product Name</label>
        <input type="text" id="product-name" required placeholder="e.g., Roasted Almonds">
        
        <label>Category</label>
        <select id="product-category">
            <option value="Nuts">Nuts</option>
            <option value="Dried Fruits">Dried Fruits</option>
            <option value="Mixes">Mixes</option>
        </select>
        
        <label>Price (₱)</label>
        <input type="number" id="product-price" required placeholder="0.00">

        <label>Stock Quantity</label>
        <input type="number" id="product-stock" required value="10">
        
        <label>Product Image</label>
        <input type="file" id="product-image" accept="image/*" required style="padding: 0.7rem; border: 1px dashed #BCAAA4;">
        
        <button type="submit" id="btn-upload" style="margin-top: 1rem;">Upload to Store</button>
    </form>

    <h2 style="margin-top: 4rem;">Manage Inventory</h2>
    <div id="admin-product-list"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
