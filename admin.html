<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nini Nuts - Admin Terminal</title>
    <style>
        body { font-family: sans-serif; background: #333; color: white; padding: 2rem; }
        .container { max-width: 800px; margin: auto; background: #444; padding: 2rem; border-radius: 8px; }
        input, select, button { width: 100%; padding: 0.8rem; margin-bottom: 1rem; box-sizing: border-box; }
        button { background: #d35400; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background: #e67e22; }
        .product-row { display: flex; justify-content: space-between; align-items: center; background: #555; padding: 1rem; margin-bottom: 10px; border-radius: 5px; }
        .product-row img { height: 50px; width: 50px; object-fit: cover; border-radius: 4px; margin-right: 15px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div id="passcode-screen" style="text-align: center; margin-top: 100px;">
    <h2>Admin Access Required</h2>
</div>

<div class="container" id="admin-dashboard" style="display: none;">
    <button onclick="window.location.href='index.html'" style="background: #666;">← Back to Shop</button>
    
    <h2>Add New Product</h2>
    <form onsubmit="addProduct(event)">
        <label>Product Name</label>
        <input type="text" id="product-name" required>
        
        <label>Category</label>
        <select id="product-category">
            <option value="Nuts">Nuts</option>
            <option value="Dried Fruits">Dried Fruits</option>
            <option value="Mixes">Mixes</option>
        </select>
        
        <label>Price (₱)</label>
        <input type="number" id="product-price" required>

        <label>Stock Quantity</label>
        <input type="number" id="product-stock" required value="10">
        
        <label>Product Image</label>
        <input type="file" id="product-image" accept="image/*" required>
        
        <button type="submit" id="btn-upload">Upload to Store</button>
    </form>

    <h2 style="margin-top: 3rem;">Manage Inventory</h2>
    <div id="admin-product-list"></div>
</div>

<script src="admin.js"></script>
</body>
</html>
