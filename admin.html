<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nini Nuts - Admin Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background-color: #f0f8ff;"> <header style="background-color: #87ceeb;"> <div class="logo">ADMIN DASHBOARD</div>
    <nav>
        <button onclick="window.location.href='index.html'">Back to Shop</button>
    </nav>
</header>

<div class="container hidden" id="admin-content">
    <form onsubmit="uploadProduct(event)">
        <h3 style="color: #87ceeb; text-align: center; margin-top: 0;">Add New Product</h3>
        
        <label style="font-weight: bold; color: #888; font-size: 0.9rem;">Product Name</label>
        <input type="text" id="p-name" placeholder="e.g., Spicy Cashews" required>
        
        <label style="font-weight: bold; color: #888; font-size: 0.9rem;">Category</label>
        <select id="p-category" required>
            <option value="Nuts">Nuts</option>
            <option value="Dried Fruits">Dried Fruits</option>
            <option value="Mixes">Mixes</option>
        </select>
        
        <label style="font-weight: bold; color: #888; font-size: 0.9rem;">Price (₱)</label>
        <input type="number" id="p-price" placeholder="e.g., 250" required min="1" step="0.01">
        
        <label style="font-weight: bold; color: #888; font-size: 0.9rem;">Product Image</label>
        <input type="file" id="p-image" accept="image/*" required style="border: none; padding: 0;">
        
        <button type="submit" class="btn-primary" id="btn-upload" style="background:#87ceeb; margin-top: 1rem;">Upload to Database</button>
    </form>
</div>

<script src="app.js"></script>

<script>
    const UI_PASSCODE = "pastelnuts2026"; // Feel free to change this

    async function secureAdminPage() {
        // 1. Ensure user is logged in
        const { data: { session } } = await supabaseClient.auth.getSession();
        
        if (!session) {
            alert("Security Alert: You are not logged in.");
            window.location.href = 'index.html';
            return;
        }

        // 2. Ensure user matches the ADMIN_EMAIL from app.js
        if (session.user.email !== ADMIN_EMAIL) {
            alert("Security Alert: Unauthorized account. Redirecting.");
            window.location.href = 'index.html';
            return;
        }

        // 3. Prompt for UI Passcode
        const passcode = prompt("Enter the Admin Passcode to unlock the dashboard:");
        
        if (passcode === UI_PASSCODE) {
            document.getElementById('admin-content').classList.remove('hidden');
        } else {
            alert("Incorrect passcode.");
            window.location.href = 'index.html';
        }
    }

    // Execute security check on load
    secureAdminPage();
</script>
</body>
</html>
